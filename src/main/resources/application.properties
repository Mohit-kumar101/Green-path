spring.application.name=Green-path

# Dev-friendly static caching (raise max-age in production behind a CDN)
spring.web.resources.cache.cachecontrol.max-age=0
spring.web.resources.chain.cache=false
server.port=${PORT:8080}

# MongoDB: required via MONGODB_URI (Docker/Render) or spring.profiles.active=local for localhost
spring.data.mongodb.uri=${MONGODB_URI:${SPRING_DATA_MONGODB_URI:}}

# Used when building short URLs in API responses (no trailing slash)
app.public-base-url=${PUBLIC_BASE_URL:http://localhost:8080}

# Chaos mode: probability (0–1) that a chaos-enabled link redirects to the classic surprise clip
app.chaos-probability=${CHAOS_PROBABILITY:0.12}

# Salt mixed with client IP before hashing for click analytics (change in production)
app.click-fingerprint-salt=${CLICK_FINGERPRINT_SALT:greenpath-clicks}

# Production: set true so only https:// targets can be shortened (reduces mixed-content and downgrade risk)
app.url-require-https=${URL_REQUIRE_HTTPS:false}

# Validates targets are http(s) with public DNS (mitigates SSRF-style abuse). Disable only for local demos.
app.redirect-target-safety.enabled=${REDIRECT_TARGET_SAFETY:true}

# Actuator (health for orchestrators / interviews)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=ShrinkPath
info.app.description=URL shortener with MongoDB

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# SaaS: per-API-key create burst limit (per rolling hour)
app.rate-limit.creates-per-hour=${RATE_LIMIT_CREATES_PER_HOUR:120}

# Optional: set to enable POST /api/billing/demo-upgrade (never expose publicly)
app.billing-admin-secret=${BILLING_ADMIN_SECRET:}
